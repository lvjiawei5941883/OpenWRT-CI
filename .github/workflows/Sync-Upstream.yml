# SPDX-License-Identifier: MIT
# 同步上游 VIKINGYFY/OpenWRT-CI，保留老板的定制文件

name: Sync-Upstream

on:
  schedule:
    # 每天 UTC 18:00（北京时间凌晨 2 点）
    - cron: '0 18 * * *'
  workflow_dispatch:

permissions: write-all

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add Upstream
        run: |
          git remote add upstream https://github.com/VIKINGYFY/OpenWRT-CI.git || true
          git fetch upstream main

      - name: Create Sync Branch
        run: |
          TODAY=$(date +%Y%m%d)
          echo "TODAY=$TODAY" >> $GITHUB_ENV
          git checkout -b sync-upstream-$TODAY

      - name: Write PR Body Template
        run: |
          mkdir -p .github
          cat > .github/sync-pr-body.md <<'BODY'
          #### 自动同步上游 VIKINGYFY/OpenWRT-CI

          老板的定制文件已从 main 恢复：
          - .github/workflows/QCA-ALL.yml — matrix 固定 IPQ60XX-WIFI-YES
          - Config/IPQ60XX-WIFI-YES.txt — 京东云设备列表

          Scripts/PRIVATE.sh、Config/PRIVATE.txt 因上游不存在不会被覆盖。

          > review 没问题后 squash merge
          BODY

      - name: Merge Upstream with Protected Files
        run: |
          # 先把 upstream/main 的所有文件覆盖进来
          git checkout upstream/main -- .

          # === 恢复老板的定制文件 ===
          # QCA-ALL.yml：matrix 固定只编 IPQ60XX-WIFI-YES
          git checkout main -- .github/workflows/QCA-ALL.yml
          # IPQ60XX-WIFI-YES.txt：只保留京东云设备
          git checkout main -- Config/IPQ60XX-WIFI-YES.txt

          # Scripts/PRIVATE.sh 和 Config/PRIVATE.txt 上游不存在，自动保留

      - name: Check Diff
        id: diff
        run: |
          git add -A
          if git diff --cached --quiet main; then
            echo "no_changes=true" >> $GITHUB_OUTPUT
            echo "已是最新，无需同步"
          else
            echo "no_changes=false" >> $GITHUB_OUTPUT
            git diff --cached --stat main
          fi

      - name: Commit & Push
        if: steps.diff.outputs.no_changes == 'false'
        run: |
          git commit -F- <<'COMMIT'
          sync: 同步上游 VIKINGYFY/OpenWRT-CI

          已自动恢复老板的定制文件：
          - .github/workflows/QCA-ALL.yml（matrix 固定 IPQ60XX-WIFI-YES）
          - Config/IPQ60XX-WIFI-YES.txt（京东云设备列表）

          Scripts/PRIVATE.sh、Config/PRIVATE.txt 因上游不存在不会被覆盖
          COMMIT
          git push origin sync-upstream-$TODAY --force

      - name: Create PR
        if: steps.diff.outputs.no_changes == 'false'
        env:
          GH_TOKEN: ${{ secrets.PAT }}
        run: |
          gh pr create \
            --title "sync: 同步上游 $(date +%Y-%m-%d)" \
            --body-file .github/sync-pr-body.md \
            --base main \
            --head sync-upstream-$TODAY
