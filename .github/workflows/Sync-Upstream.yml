# SPDX-License-Identifier: MIT
# 全自动同步上游 VIKINGYFY/OpenWRT-CI，保留老板的定制文件

name: Sync-Upstream

on:
  schedule:
    # 每天 UTC 18:00（北京时间凌晨 2 点）
    - cron: '0 18 * * *'
  workflow_dispatch:

permissions: write-all

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch Upstream
        run: |
          git remote add upstream https://github.com/VIKINGYFY/OpenWRT-CI.git || true
          git fetch upstream main

      - name: Check if Sync Needed
        id: check
        run: |
          BEHIND=$(git rev-list --count main..upstream/main)
          echo "behind=$BEHIND" >> $GITHUB_OUTPUT
          if [ "$BEHIND" -eq 0 ]; then
            echo "已是最新，无需同步"
          else
            echo "落后 $BEHIND 个提交，开始同步"
          fi

      - name: Save Protected Files
        if: steps.check.outputs.behind != '0'
        run: |
          cp .github/workflows/QCA-ALL.yml /tmp/QCA-ALL.yml
          cp Config/IPQ60XX-WIFI-YES.txt /tmp/IPQ60XX-WIFI-YES.txt

      - name: Merge Upstream
        if: steps.check.outputs.behind != '0'
        run: |
          git merge upstream/main --no-edit -X theirs

      - name: Restore Protected Files
        if: steps.check.outputs.behind != '0'
        run: |
          cp /tmp/QCA-ALL.yml .github/workflows/QCA-ALL.yml
          cp /tmp/IPQ60XX-WIFI-YES.txt Config/IPQ60XX-WIFI-YES.txt
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "sync: 恢复老板的定制文件"
          fi

      - name: Push
        if: steps.check.outputs.behind != '0'
        run: |
          git push origin main
