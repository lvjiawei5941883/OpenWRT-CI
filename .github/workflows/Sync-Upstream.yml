# SPDX-License-Identifier: MIT
# 同步上游 VIKINGYFY/OpenWRT-CI，保留老板的定制文件

name: Sync-Upstream

on:
  schedule:
    # 每天凌晨 2 点 (UTC+8)
    - cron: '0 18 * * *'
  workflow_dispatch:

permissions: write-all

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@main
        with:
          fetch-depth: 0

      - name: Setup Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add Upstream
        run: |
          git remote add upstream https://github.com/VIKINGYFY/OpenWRT-CI.git || true
          git fetch upstream main

      - name: Create Sync Branch
        run: |
          git checkout -b sync-upstream-$(date +%Y%m%d)

      - name: Merge Upstream (Protected Files Strategy)
        run: |
          # 策略：用 upstream/main 覆盖所有文件，然后恢复受保护文件
          git checkout upstream/main -- .

          # === 受保护的老板定制文件 ===
          # 恢复 QCA-ALL.yml（只编 IPQ60XX-WIFI-YES）
          git checkout main -- .github/workflows/QCA-ALL.yml
          # 恢复设备列表（只保留京东云设备）
          git checkout main -- Config/IPQ60XX-WIFI-YES.txt
          # 恢复 Packages.sh（包含老板自己加的包）
          git checkout main -- Scripts/Packages.sh

          # === 新增的隔离文件不受保护 ===
          # Scripts/PRIVATE.sh 和 Config/PRIVATE.txt 上游不存在，不会被覆盖

      - name: Check Diff
        id: diff
        run: |
          if git diff --quiet main HEAD && git diff --quiet --cached; then
            echo "no_changes=true" >> $GITHUB_OUTPUT
            echo "已是最新，无需同步"
          else
            echo "no_changes=false" >> $GITHUB_OUTPUT
            git diff --stat HEAD main
          fi

      - name: Commit & Create PR
        if: steps.diff.outputs.no_changes == 'false'
        run: |
          git add -A
          git commit -m "sync: 同步上游 VIKINGYFY/OpenWRT-CI

          受保护文件已自动恢复：
          - .github/workflows/QCA-ALL.yml（只编 IPQ60XX）
          - Config/IPQ60XX-WIFI-YES.txt（京东云设备列表）
          - Scripts/Packages.sh（老板定制包）"

          git push origin sync-upstream-$(date +%Y%m%d) --force

          gh pr create \
            --title "sync: 同步上游 $(date +%Y-%m-%d)" \
            --body "自动同步上游 VIKINGYFY/OpenWRT-CI。
            受保护文件已自动从 main 分支恢复，请 review 后合并。若一切正常可直接 squash merge。" \
            --base main \
            --head sync-upstream-$(date +%Y%m%d) || echo "PR 可能已存在，跳过创建"
